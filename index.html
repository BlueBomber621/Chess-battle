<!-- Freehand Chess (STANDALONE): open this .html directly in a browser. Paste your own Anthropic API key into the bar at the top; it stays in the tab's memory only and is never written to the file. The Claude API plays Black with full move memory, spoken commentary, questions your illegal moves, enforces its own legal play, and reflects on the game afterward. GOD MODE lets you edit the board at will, grant extra turns to either side, and forge brand-new pieces (including absurd ones) that the rules engine and the API both understand. Note: this direct-key version does NOT run inside the Claude.ai artifact preview (that environment blocks outside calls) — save it and open it as a normal webpage. -->
<div id="root"></div>

<style>
  :root {
    --bg: #12100d;
    --panel: #1c1915;
    --line: #2e2a23;
    --ink: #efe9dc;
    --muted: #9a9283;
    --light: #d8cbb0;
    --dark: #6b5a3f;
    --accent: #c8532b;
    --accent-soft: #e0946c;
    --sel: #4c8a5a;
    --font-display: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --font-body: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  }

  #root { font-family: var(--font-body); color: var(--ink); }

  * { box-sizing: border-box; }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  header.masthead {
    border-bottom: 2px solid var(--line);
    padding-bottom: 12px;
  }
  .kicker {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent-soft);
    margin: 0 0 4px;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 34px;
    line-height: 0.95;
    margin: 0;
    letter-spacing: -0.01em;
  }
  h1 em { color: var(--accent); font-style: italic; }
  .sub {
    color: var(--muted);
    font-size: 12px;
    margin: 8px 0 0;
    max-width: 56ch;
    line-height: 1.5;
  }

  .board-frame {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 14px;
    align-self: center;
    box-shadow: 0 18px 50px -30px #000;
  }
  .board-frame.editing { border-color: var(--sel); box-shadow: 0 0 0 1px var(--sel), 0 18px 50px -30px #000; }
  .coords-row { display: flex; }
  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    width: min(88vw, 480px);
    aspect-ratio: 1;
    border: 2px solid var(--dark);
  }
  .board.editing { cursor: crosshair; }
  .sq {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    font-size: clamp(24px, 8vw, 44px);
    line-height: 1;
    cursor: pointer;
    position: relative;
    user-select: none;
    transition: background 0.08s;
  }
  .sq.light { background: var(--light); }
  .sq.dark  { background: var(--dark); }
  .sq.sel::after {
    content: "";
    position: absolute; inset: 0;
    box-shadow: inset 0 0 0 3px var(--sel);
  }
  .sq.lastmove::before {
    content: "";
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0.22;
  }
  .pc { position: relative; z-index: 2; }
  .pc.white { color: #faf6ee; text-shadow: 0 1px 1px #000, 0 0 2px #6b6255; }
  .pc.black { color: #17130d; text-shadow: 0 1px 0 #8f8574; }
  /* custom pieces: glyph sits in a side-colored chip so White vs Black reads clearly */
  .pc.custom {
    display: inline-flex; align-items: center; justify-content: center;
    width: 0.98em; height: 0.98em; border-radius: 50%;
    font-size: 0.68em; text-shadow: none;
  }
  .pc.custom.white { background: #faf6ee; color: #17130d; box-shadow: 0 0 0 2px #6b6255; }
  .pc.custom.black { background: #17130d; color: #faf6ee; box-shadow: 0 0 0 2px #8f8574; }

  .files, .ranks { color: var(--muted); font-size: 10px; letter-spacing: 0.1em; }
  .files { display: grid; grid-template-columns: repeat(8,1fr); width: min(88vw,480px); margin-left: 18px; padding-top: 4px; }
  .files span { text-align: center; }
  .ranks { display: flex; flex-direction: column; justify-content: space-around; width: 18px; }

  .statusline {
    display: flex; align-items: baseline; gap: 10px;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 10px 2px;
  }
  .turn-tag {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent-soft);
  }
  .status-msg { color: var(--ink); font-size: 13px; }
  .thinking { color: var(--muted); font-style: italic; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  button.btn {
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 0.05em;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  button.btn:hover { border-color: var(--accent); color: var(--accent-soft); }
  button.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.btn:disabled { opacity: 0.4; cursor: default; }
  button.btn.on { border-color: var(--sel); color: var(--sel); }

  .log {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 12px 14px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.7;
  }
  .log h2 {
    font-family: var(--font-display);
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 6px;
  }
  .log .mv { display: inline-block; margin-right: 12px; }
  .log .mv b { color: var(--accent-soft); font-weight: 400; }
  .log .side { font-size: 10px; letter-spacing: 0.1em; }
  .log .side.w { color: var(--light); }
  .log .side.b { color: var(--muted); }
  .log .empty { color: var(--muted); font-style: italic; }

  .hint { color: var(--muted); font-size: 11px; line-height: 1.5; }

  /* ---- shared panel look ---- */
  .keybar, .speech, .godbar {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
  }
  .keybar { display: flex; flex-direction: column; gap: 8px; }
  .keybar .who, .godbar .who {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent-soft); margin: 0;
  }
  .keybar .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .keybar input {
    flex: 1 1 180px;
    font-family: var(--font-body);
    font-size: 13px;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 9px 12px;
  }
  .keybar input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .keybar .note { color: var(--muted); font-size: 11px; line-height: 1.5; margin: 0; }
  .keybar .note.good { color: var(--sel); }
  .keybar .note.bad { color: var(--accent-soft); }

  .speech { border-left-color: var(--accent); min-height: 46px; }
  .speech .who {
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent-soft); margin: 0 0 4px;
  }
  .speech .said {
    font-family: var(--font-display);
    font-size: 15px; line-height: 1.4; color: var(--ink); margin: 0;
  }
  .speech .said.quiet { color: var(--muted); font-style: italic; }

  /* ---- god mode panel ---- */
  .godbar { border-left-color: var(--sel); display: flex; flex-direction: column; gap: 14px; }
  .godbar .god-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .godbar .who.god { color: var(--sel); }
  .godbar section { display: flex; flex-direction: column; gap: 8px; }
  .godbar .seclabel {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin: 0;
  }
  .godbar .rowline { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .godbar .divider { border: none; border-top: 1px solid var(--line); margin: 2px 0; }

  .palette { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .swatch {
    font-family: var(--font-body);
    min-width: 40px;
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 6px 8px;
    cursor: pointer;
    font-size: 22px; line-height: 1;
  }
  .swatch small { font-size: 8px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
  .swatch:hover { border-color: var(--accent); }
  .swatch.sel { border-color: var(--sel); box-shadow: inset 0 0 0 1px var(--sel); }
  .swatch.erase { font-size: 12px; color: var(--accent-soft); }

  .chip {
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 4px 8px;
    color: var(--muted);
    display: inline-flex; gap: 6px; align-items: baseline;
  }
  .chip b { color: var(--ink); font-weight: 400; }

  .forge { display: flex; flex-direction: column; gap: 8px; }
  .forge .frow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .forge input[type=text] {
    font-family: var(--font-body); font-size: 13px;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); padding: 7px 10px;
  }
  .forge input.name { flex: 1 1 160px; }
  .forge input.glyph { width: 64px; text-align: center; font-size: 18px; }
  .forge input.leaps { flex: 1 1 160px; }
  .forge input:focus-visible { outline: 2px solid var(--sel); outline-offset: 1px; }
  .forge label.chk {
    font-size: 11px; color: var(--ink);
    display: inline-flex; gap: 5px; align-items: center;
    border: 1px solid var(--line); padding: 5px 9px; cursor: pointer;
  }
  .forge label.chk input { accent-color: var(--sel); }
  .forge .fieldlabel { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  .forge .err { color: var(--accent-soft); font-size: 11px; margin: 0; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<script type="module">
  const $ = (s, r=document) => r.querySelector(s);

  // Direct browser call to the Anthropic API using the key pasted into the page.
  // The key lives only in state (this tab's memory); it is never written to the file.
  function apiHeaders() {
    return {
      "Content-Type": "application/json",
      "x-api-key": state.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    };
  }

  // ================= piece encoding =================
  // A board cell is null or a string: color ("w"/"b") + type id.
  // Builtin type ids are single letters (K Q R B N P). Custom type ids look
  // like "z0", "z1", ... so they never collide with builtin letters.
  const colorOf = p => p[0];
  const typeOf  = p => p.slice(1);
  const defOf   = p => PIECE_DEFS[typeOf(p)];

  // Movement direction sets
  const ORTH = [[1,0],[-1,0],[0,1],[0,-1]];
  const DIAG = [[1,1],[1,-1],[-1,1],[-1,-1]];
  const ALL8 = [...ORTH, ...DIAG];

  // expand a single (a,b) vector into all 8 symmetric leaper offsets
  function expandLeaper(a, b) {
    const seen = new Set(), out = [];
    for (const [x,y] of [[a,b],[b,a]])
      for (const sx of [1,-1]) for (const sy of [1,-1]) {
        const dr = x*sx, dc = y*sy;
        if (dr===0 && dc===0) continue;
        const k = dr+","+dc;
        if (!seen.has(k)) { seen.add(k); out.push([dr,dc]); }
      }
    return out;
  }
  const KNIGHT = expandLeaper(1,2);

  // Registry of every piece type. glyph = [whiteGlyph, blackGlyph].
  // leaps = single jumps; slides = repeating rays; pawn = pawn logic;
  // teleport = may move to any empty/enemy square; royal = losing it loses the game;
  // letter = single char used in the plain-text board sent to the API; desc = human summary.
  const PIECE_DEFS = {
    K: { name:"King",   builtin:true, royal:true, glyph:["♔","♚"], leaps:ALL8, letter:"K", desc:"one square any direction" },
    Q: { name:"Queen",  builtin:true, glyph:["♕","♛"], slides:ALL8, letter:"Q", desc:"slides any direction" },
    R: { name:"Rook",   builtin:true, glyph:["♖","♜"], slides:ORTH, letter:"R", desc:"slides orthogonally" },
    B: { name:"Bishop", builtin:true, glyph:["♗","♝"], slides:DIAG, letter:"B", desc:"slides diagonally" },
    N: { name:"Knight", builtin:true, glyph:["♘","♞"], leaps:KNIGHT, letter:"N", desc:"knight leaps" },
    P: { name:"Pawn",   builtin:true, pawn:true, glyph:["♙","♟"], letter:"P", desc:"pawn moves/captures, auto-queens" }
  };
  // Order builtin types appear in the palette
  const BUILTIN_ORDER = ["K","Q","R","B","N","P"];
  // Letters available to hand out to forged pieces for the text board (avoid K Q R B N P)
  const CUSTOM_LETTERS = "CDEFGHIJLMOSTUVWXYZ".split("");

  function glyphFor(p) { const d = defOf(p); return d ? d.glyph[colorOf(p)==="w"?0:1] : "?"; }
  function isCustom(p) { const d = defOf(p); return d && !d.builtin; }

  // ---- initial position: player = white (bottom), Claude API = black (top) ----
  function freshBoard() {
    const back = ["R","N","B","Q","K","B","N","R"];
    const b = Array.from({length:8}, ()=>Array(8).fill(null));
    for (let i=0;i<8;i++){
      b[0][i] = "b"+back[i];
      b[1][i] = "bP";
      b[6][i] = "wP";
      b[7][i] = "w"+back[i];
    }
    return b;
  }

  const state = {
    board: freshBoard(),
    turn: "w",          // whose move it is ("w"/"b"/null)
    sel: null,          // [r,c]
    last: null,         // [[r,c],[r,c]]
    history: [],        // flat list of { side:"w"|"b", san }
    busy: false,
    over: false,
    speech: "Waiting for your first move.",
    apiKey: "",
    // ---- god mode ----
    editMode: false,          // clicking squares paints pieces instead of moving
    brushColor: "w",          // color to paint
    brushType: "Q",           // type id to paint, or "erase"
    autoPass: true,           // hand the turn to Black automatically after your move
    customCount: 0            // how many pieces have been forged (for id assignment)
  };

  const files = ["a","b","c","d","e","f","g","h"];
  const sqName = (r,c) => files[c] + (8-r);

  // ---- render ----
  function render() {
    const root = $("#root");
    root.innerHTML = `
      <div class="wrap">
        <header class="masthead">
          <p class="kicker">You vs. the Claude API</p>
          <h1>Freehand <em>Chess</em></h1>
          <p class="sub">You move first, and the rules never apply to you. Open <b>God Mode</b> below to edit the board at will, hand extra turns to either side, and forge new pieces &mdash; sensible or absurd. Your opponent still plays in earnest against whatever it sees.</p>
        </header>

        <div class="keybar">
          <p class="who">Anthropic API key</p>
          <div class="row">
            <input id="keyinput" type="password" placeholder="sk-ant-…" autocomplete="off" spellcheck="false" />
            <button class="btn" id="keyset">Use key</button>
          </div>
          <p class="note" id="keynote">Paste your key to enable the opponent. It stays in this tab only — never saved to the file.</p>
        </div>

        <div class="board-frame" id="boardframe">
          <div class="coords-row">
            <div class="ranks" id="ranks"></div>
            <div>
              <div class="board" id="board"></div>
            </div>
          </div>
          <div class="files" id="files"></div>
        </div>

        <div class="statusline">
          <span class="turn-tag" id="turntag"></span>
          <span class="status-msg" id="status"></span>
        </div>

        <div class="speech">
          <p class="who">Black &mdash; the API</p>
          <p class="said quiet" id="speech">Waiting for your first move.</p>
        </div>

        <div class="godbar">
          <div class="god-head">
            <p class="who god">God Mode</p>
            <button class="btn" id="editToggle">Board editor: off</button>
          </div>

          <section id="editorSection">
            <p class="seclabel">Paint a piece onto any square</p>
            <div class="rowline">
              <button class="btn" id="brushW">White</button>
              <button class="btn" id="brushB">Black</button>
            </div>
            <div class="palette" id="palette"></div>
          </section>

          <hr class="divider" />

          <section>
            <p class="seclabel">Extra turns</p>
            <div class="rowline">
              <label class="chk" style="font-size:11px;display:inline-flex;gap:5px;align-items:center;border:1px solid var(--line);padding:5px 9px;cursor:pointer;">
                <input type="checkbox" id="autoPass" /> Black replies to each of my moves
              </label>
            </div>
            <div class="rowline">
              <button class="btn" id="whiteTurn">Give White a turn</button>
              <button class="btn" id="blackTurn">Give Black a turn</button>
            </div>
            <p class="seclabel">Turn off the reply toggle to keep moving as White as many times as you like, then hand it over.</p>
          </section>

          <hr class="divider" />

          <section class="forge">
            <p class="seclabel">Forge a new piece</p>
            <div class="frow">
              <input type="text" class="name" id="fName" placeholder="Name (e.g. Dragon)" maxlength="24" />
              <input type="text" class="glyph" id="fGlyph" placeholder="🐉" maxlength="4" />
            </div>
            <div class="fieldlabel">How it moves (combine as many as you like):</div>
            <div class="frow">
              <label class="chk"><input type="checkbox" id="mOrthStep" /> step ↑↓←→</label>
              <label class="chk"><input type="checkbox" id="mDiagStep" /> step diagonally</label>
              <label class="chk"><input type="checkbox" id="mOrthSlide" /> slide (rook)</label>
              <label class="chk"><input type="checkbox" id="mDiagSlide" /> slide (bishop)</label>
              <label class="chk"><input type="checkbox" id="mKnight" /> knight leaps</label>
              <label class="chk"><input type="checkbox" id="mPawn" /> pawn moves</label>
              <label class="chk"><input type="checkbox" id="mTeleport" /> teleport anywhere</label>
              <label class="chk"><input type="checkbox" id="mRoyal" /> royal (losing it loses the game)</label>
            </div>
            <div class="frow">
              <span class="fieldlabel">Extra leaps (row,col pairs):</span>
              <input type="text" class="leaps" id="fLeaps" placeholder="e.g. 3,1; 2,3" />
              <button class="btn" id="forgeBtn">Forge piece</button>
            </div>
            <p class="err" id="forgeErr"></p>
            <div class="rowline" id="customList"></div>
          </section>
        </div>

        <div class="controls">
          <button class="btn" id="reset">New game</button>
          <button class="btn" id="pass">Skip my turn</button>
          <button class="btn" id="clear">Clear board</button>
        </div>

        <div class="log">
          <h2>Move log</h2>
          <div id="movelist"></div>
        </div>

        <p class="hint">Play: tap a piece, then tap where it should go &mdash; any square is legal. Editor: flip it on, pick a color + piece, and click squares to place or erase. The API opponent responds to the position it sees, custom pieces and all.</p>
      </div>`;

    // ranks / files labels
    $("#ranks").innerHTML = [8,7,6,5,4,3,2,1].map(n=>`<span>${n}</span>`).join("");
    $("#files").innerHTML = files.map(f=>`<span>${f}</span>`).join("");

    drawBoard();
    drawStatus();
    drawLog();
    drawSpeech();
    drawPalette();
    drawCustomList();
    drawEditorState();

    $("#reset").onclick = newGame;
    $("#clear").onclick = clearBoard;
    $("#pass").onclick = () => { if(!state.busy && !state.over){ logMove("w","(skip)"); state.turn="b"; drawStatus(); aiTurn(); } };

    // god mode wiring
    $("#editToggle").onclick = () => { state.editMode = !state.editMode; state.sel = null; drawEditorState(); drawBoard(); };
    $("#brushW").onclick = () => { state.brushColor="w"; drawPalette(); };
    $("#brushB").onclick = () => { state.brushColor="b"; drawPalette(); };
    const auto = $("#autoPass");
    auto.checked = state.autoPass;
    auto.onchange = () => { state.autoPass = auto.checked; };
    $("#whiteTurn").onclick = () => {
      if (state.over) return;
      state.turn = "w"; state.busy = false; drawStatus();
    };
    $("#blackTurn").onclick = () => {
      if (state.busy || state.over) return;
      state.turn = "b"; drawStatus(); aiTurn();
    };
    $("#forgeBtn").onclick = forgePiece;

    const keyInput = $("#keyinput");
    const keyNote = $("#keynote");
    if (keyInput) {
      keyInput.value = state.apiKey;
      const applyKey = () => {
        state.apiKey = keyInput.value.trim();
        if (state.apiKey) {
          keyNote.textContent = "Key set for this session. The opponent is live.";
          keyNote.className = "note good";
        } else {
          keyNote.textContent = "No key yet — the opponent can't respond until you add one.";
          keyNote.className = "note bad";
        }
      };
      $("#keyset").onclick = applyKey;
      keyInput.onkeydown = (e) => { if (e.key === "Enter") applyKey(); };
      if (state.apiKey) { keyNote.textContent = "Key set for this session. The opponent is live."; keyNote.className = "note good"; }
    }
  }

  function drawSpeech(thinking=false) {
    const el = $("#speech");
    if (!el) return;
    if (thinking) { el.className = "said quiet"; el.textContent = "considering the position…"; return; }
    el.className = "said" + (state.speech ? "" : " quiet");
    el.textContent = state.speech || "…";
  }

  function drawEditorState() {
    const btn = $("#editToggle"), frame = $("#boardframe"), board = $("#board");
    if (!btn) return;
    btn.textContent = "Board editor: " + (state.editMode ? "ON" : "off");
    btn.classList.toggle("on", state.editMode);
    if (frame) frame.classList.toggle("editing", state.editMode);
    if (board) board.classList.toggle("editing", state.editMode);
    drawStatus();
  }

  // palette of brushes: builtin pieces + custom pieces + erase, in the current brush color
  function drawPalette() {
    const pal = $("#palette");
    if (!pal) return;
    $("#brushW").classList.toggle("on", state.brushColor==="w");
    $("#brushB").classList.toggle("on", state.brushColor==="b");
    const types = [...BUILTIN_ORDER, ...Object.keys(PIECE_DEFS).filter(t=>!PIECE_DEFS[t].builtin)];
    let html = "";
    for (const t of types) {
      const def = PIECE_DEFS[t];
      const token = state.brushColor + t;
      const isW = state.brushColor==="w";
      const cust = !def.builtin;
      const glyph = cust
        ? `<span class="pc custom ${isW?"white":"black"}" style="font-size:16px;width:1.3em;height:1.3em;">${def.glyph[isW?0:1]}</span>`
        : def.glyph[isW?0:1];
      html += `<button class="swatch${state.brushType===t?" sel":""}" data-type="${t}" title="${def.name}: ${def.desc}">${glyph}<small>${def.name}</small></button>`;
    }
    html += `<button class="swatch erase${state.brushType==="erase"?" sel":""}" data-type="erase" title="Erase square">✕<small>erase</small></button>`;
    pal.innerHTML = html;
    pal.querySelectorAll(".swatch").forEach(b => {
      b.onclick = () => { state.brushType = b.dataset.type; drawPalette(); };
    });
  }

  function drawCustomList() {
    const box = $("#customList");
    if (!box) return;
    const customs = Object.entries(PIECE_DEFS).filter(([,d])=>!d.builtin);
    if (!customs.length) { box.innerHTML = `<span class="chip" style="border-style:dashed;">No forged pieces yet.</span>`; return; }
    box.innerHTML = customs.map(([id,d]) =>
      `<span class="chip">${d.glyph[0]} <b>${d.name}</b> <span style="opacity:.7;">(${d.letter}) — ${d.desc}</span></span>`).join("");
  }

  function drawBoard() {
    const board = $("#board");
    let html = "";
    for (let r=0;r<8;r++){
      for (let c=0;c<8;c++){
        const shade = (r+c)%2===0 ? "light" : "dark";
        const pc = state.board[r][c];
        const isSel = state.sel && state.sel[0]===r && state.sel[1]===c;
        const isLast = state.last && (
          (state.last[0][0]===r && state.last[0][1]===c) ||
          (state.last[1][0]===r && state.last[1][1]===c));
        const cls = ["sq", shade, isSel?"sel":"", isLast?"lastmove":""].filter(Boolean).join(" ");
        let glyph = "";
        if (pc) {
          const isW = colorOf(pc)==="w";
          const custClass = isCustom(pc) ? " custom" : "";
          glyph = `<span class="pc ${isW?"white":"black"}${custClass}">${glyphFor(pc)}</span>`;
        }
        html += `<div class="${cls}" data-r="${r}" data-c="${c}" role="button" aria-label="${sqName(r,c)}">${glyph}</div>`;
      }
    }
    board.innerHTML = html;
    if (state.editMode) board.classList.add("editing");
    board.querySelectorAll(".sq").forEach(el=>{
      el.onclick = () => onSquare(+el.dataset.r, +el.dataset.c);
    });
  }

  function drawStatus() {
    const tag = $("#turntag"), msg = $("#status");
    if (!tag) return;
    if (state.editMode) {
      tag.textContent = "Editor";
      const label = state.brushType==="erase" ? "erase" : `${state.brushColor==="w"?"white":"black"} ${PIECE_DEFS[state.brushType].name}`;
      msg.textContent = `Click a square to place: ${label}.`;
      return;
    }
    if (state.over) { tag.textContent = "Game over"; msg.textContent = state.over; return; }
    if (state.busy) { tag.textContent = "Black"; msg.innerHTML = `<span class="thinking">the API is thinking…</span>`; return; }
    tag.textContent = state.turn === "w" ? "Your move" : "Black";
    msg.textContent = state.turn === "w" ? "Move any piece, anywhere." : "";
  }

  function drawLog() {
    const list = $("#movelist");
    if (!list) return;
    if (!state.history.length) { list.innerHTML = `<span class="empty">No moves yet.</span>`; return; }
    list.innerHTML = state.history.map((h,i) =>
      `<span class="mv"><b>${i+1}.</b> <span class="side ${h.side}">${h.side==="w"?"W":"B"}</span> ${h.san}</span>`).join("");
    list.scrollTop = list.scrollHeight;
  }

  function logMove(side, san) {
    state.history.push({ side, san: san || "(skip)" });
    drawLog();
  }

  // ---- interaction: play mode (no legality checks for White) OR editor paint ----
  function onSquare(r,c) {
    if (state.editMode) {
      if (state.brushType==="erase") state.board[r][c] = null;
      else state.board[r][c] = state.brushColor + state.brushType;
      state.sel = null;
      drawBoard();
      return;
    }
    if (state.busy || state.over || state.turn!=="w") return;
    const pc = state.board[r][c];
    if (state.sel) {
      const [sr,sc] = state.sel;
      if (sr===r && sc===c) { state.sel=null; drawBoard(); return; }
      const moving = state.board[sr][sc];
      if (!moving) { state.sel = pc ? [r,c] : null; drawBoard(); return; }
      // execute the (illegal-by-design) move
      const notation = notate(moving, [sr,sc], [r,c], state.board[r][c]);
      state.board[r][c] = moving;
      state.board[sr][sc] = null;
      // free promotion: if a pawn reaches the far rank, auto-queen (cheater's perk)
      const md = defOf(moving);
      if (md && md.pawn && colorOf(moving)==="w" && r===0) state.board[r][c]="wQ";
      state.last = [[sr,sc],[r,c]];
      state.sel = null;
      logMove("w", notation);
      drawBoard();
      if (checkEnd()) return;                 // captured a royal piece outright
      if (state.autoPass) {
        state.turn = "b";
        if (endByRule()) return;              // your move delivered checkmate/stalemate
        aiTurn();
      } else {
        state.turn = "w";                     // keep the move — extra turn for you
        drawStatus();
      }
    } else {
      if (pc && colorOf(pc)==="w") { state.sel=[r,c]; drawBoard(); }
    }
  }

  function notate(pc, from, to, captured) {
    const letter = pieceLetter(pc);
    return `${letter}${sqName(...from)}${captured?"x":"-"}${sqName(...to)}`;
  }

  function pieceLetter(pc) {
    const def = defOf(pc);
    if (!def) return "?";
    if (def.pawn) return "";
    return def.letter || typeOf(pc);
  }

  // ---- forge a new piece from the panel inputs ----
  function forgePiece() {
    const err = $("#forgeErr");
    err.textContent = "";
    const name = $("#fName").value.trim() || "Piece";
    let glyph = $("#fGlyph").value.trim();
    if (!glyph) glyph = "⭑"; // default star if none given
    // keep glyph short (one grapheme-ish)
    glyph = Array.from(glyph).slice(0,2).join("");

    let leaps = [], slides = [];
    const descParts = [];
    if ($("#mOrthStep").checked)  { leaps = leaps.concat(ORTH); descParts.push("steps orthogonally"); }
    if ($("#mDiagStep").checked)  { leaps = leaps.concat(DIAG); descParts.push("steps diagonally"); }
    if ($("#mOrthSlide").checked) { slides = slides.concat(ORTH); descParts.push("slides orthogonally"); }
    if ($("#mDiagSlide").checked) { slides = slides.concat(DIAG); descParts.push("slides diagonally"); }
    if ($("#mKnight").checked)    { leaps = leaps.concat(KNIGHT); descParts.push("knight leaps"); }
    const pawn = $("#mPawn").checked;
    if (pawn) descParts.push("pawn moves");
    const teleport = $("#mTeleport").checked;
    if (teleport) descParts.push("teleports anywhere");
    const royal = $("#mRoyal").checked;

    // extra leaps like "3,1; 2,3"
    const raw = $("#fLeaps").value.trim();
    if (raw) {
      const pairs = raw.split(/[;\n]+/).map(s=>s.trim()).filter(Boolean);
      for (const p of pairs) {
        const m = p.match(/^-?\d+\s*,\s*-?\d+$/);
        if (!m) { err.textContent = `Couldn't read leap "${p}". Use pairs like 3,1 separated by ;`; return; }
        const [a,b] = p.split(",").map(n=>parseInt(n,10));
        leaps = leaps.concat(expandLeaper(a,b));
        descParts.push(`(${Math.abs(a)},${Math.abs(b)})-leaper`);
      }
    }

    if (!leaps.length && !slides.length && !pawn && !teleport) {
      err.textContent = "Give the piece at least one way to move.";
      return;
    }

    // de-duplicate offsets
    const dedupe = arr => { const s=new Set(), o=[]; for(const [dr,dc] of arr){const k=dr+","+dc; if(!s.has(k)){s.add(k);o.push([dr,dc]);}} return o; };

    const id = "z" + (state.customCount++);
    const letter = CUSTOM_LETTERS[Object.values(PIECE_DEFS).filter(d=>!d.builtin).length % CUSTOM_LETTERS.length] || "*";
    let desc = descParts.join(", ");
    if (royal) desc += ", royal";

    PIECE_DEFS[id] = {
      name, builtin:false, glyph:[glyph, glyph],
      leaps: dedupe(leaps), slides: dedupe(slides),
      pawn, teleport, royal, letter, desc
    };

    // auto-select the new piece as the active brush and turn the editor on
    state.brushType = id;
    state.editMode = true;
    // clear the forge inputs for the next creation
    ["fName","fGlyph","fLeaps"].forEach(idn => { const el=$("#"+idn); if(el) el.value=""; });
    ["mOrthStep","mDiagStep","mOrthSlide","mDiagSlide","mKnight","mPawn","mTeleport","mRoyal"].forEach(idn=>{ const el=$("#"+idn); if(el) el.checked=false; });

    drawPalette();
    drawCustomList();
    drawEditorState();
  }

  function checkEnd() {
    const wRoyal = hasRoyal(state.board, "w");
    const bRoyal = hasRoyal(state.board, "b");
    if (!bRoyal) {
      state.over = "Black has no royal piece left. You win.";
      state.turn=null;
      state.speech = "…my king. Let me gather my thoughts on that.";
      drawStatus(); drawSpeech(); drawBoard();
      reactToAftermath("king-captured", "White (the human) captured my last royal piece and the game is over. I (Black) lost.");
      return true;
    }
    if (!wRoyal) {
      state.over = "Your royal piece is gone. The API wins.";
      state.turn=null;
      state.speech = "The white king has fallen — let me reflect.";
      drawStatus(); drawSpeech(); drawBoard();
      reactToAftermath("won", "Black (me) captured White's last royal piece. I won the game.");
      return true;
    }
    return false;
  }

  // ---- describe board to the API in plain form, with a legend for custom pieces ----
  function boardText() {
    let lines = [];
    for (let r=0;r<8;r++){
      let cells=[];
      for (let c=0;c<8;c++){
        const p = state.board[r][c];
        if (!p) { cells.push("."); continue; }
        const def = defOf(p);
        const ch = (def && def.letter) ? def.letter : typeOf(p)[0];
        cells.push(colorOf(p)==="w" ? ch.toUpperCase() : ch.toLowerCase());
      }
      lines.push(`${8-r} ${cells.join(" ")}`);
    }
    lines.push("  a b c d e f g h");
    // legend for any custom pieces so the API can reason about them
    const customs = Object.entries(PIECE_DEFS).filter(([,d])=>!d.builtin);
    if (customs.length) {
      lines.push("");
      lines.push("Custom pieces in play (uppercase letter = White, lowercase = Black):");
      for (const [,d] of customs) {
        lines.push(`  ${d.letter}/${d.letter.toLowerCase()} = "${d.name}" — ${d.desc}`);
      }
    }
    return lines.join("\n");
  }

  // ---- Claude API opponent (full game memory + spoken comment) ----
  function historyText() {
    if (!state.history.length) return "No moves have been played yet.";
    return state.history.map((h,i) =>
      `${i+1}. ${h.side==="w"?"White":"Black"}: ${h.san}`).join("\n");
  }

  async function aiTurn() {
    if (state.over) return;
    // If the position already leaves Black with no legal reply, resolve immediately.
    if (legalMoves(state.board, "b").length===0) { state.turn="b"; endByRule(); return; }
    if (!state.apiKey) {
      state.speech = "Add your API key above and I'll respond.";
      state.turn = "w";
      drawSpeech(); drawStatus();
      return;
    }
    state.busy = true; drawStatus(); drawSpeech(true);

    const sys = `You are playing a serious game of chess as Black against a human opponent (White). Speak like a thoughtful, competitive chess player: reference the ongoing game, your plans, threats, and how the position is developing. You have the full move history each turn, so treat the game as one continuous match and let your comments build on earlier moves.

Board notation: uppercase = White pieces, lowercase = Black pieces, "." = empty square. You are Black and must move a lowercase piece. Standard pieces use K Q R B N P. The board may also contain CUSTOM pieces; if so, a legend below the board lists each custom piece's letter and exactly how it moves. Treat custom pieces as real pieces and use their described movement.

Pay attention to White's last move in the history. If it looks unusual, illegal, or impossible for a chess piece — a piece that moved in a way it shouldn't be able to, a piece that appeared out of nowhere, a jump across the board, a capture that shouldn't be possible, or a strange new piece — call it out directly in your comment. Question it the way a real opponent would: puzzled, a little suspicious, maybe accusing them of cheating. But do not stop playing: still choose your best legal Black move for the position in front of you and play on.

Respond with ONLY a strict JSON object, no prose outside it, no markdown fences:
{"from":"e7","to":"e5","say":"one or two sentences: react to White's last move (question it if it looked illegal), then comment on your own move and the position"}
Use standard square names (files a-h, ranks 1-8).`;

    const checkNote = inCheck(state.board, "b")
      ? "\n\nIMPORTANT: your king is currently in CHECK. You must make a move that gets out of check."
      : "";

    const user = `Move history so far:
${historyText()}

Current position:
${boardText()}${checkNote}

It is Black's turn. Decide your move and comment on it.`;

    let move = null, say = "";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: sys,
          messages: [{ role: "user", content: user }]
        })
      });
      const data = await res.json();
      const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean.slice(clean.indexOf("{"), clean.lastIndexOf("}")+1));
      move = parsed; say = parsed.say || parsed.note || "";
    } catch (e) {
      move = null;
    }

    applyAiMove(move, say);
  }

  function parseSq(s){
    if (!s || s.length<2) return null;
    const c = files.indexOf(s[0].toLowerCase());
    const r = 8 - parseInt(s[1],10);
    if (c<0 || r<0 || r>7) return null;
    return [r,c];
  }

  // ================= chess rules engine (Black plays legally) =================
  // White is unrestricted. Black must obey each piece's real movement, no jumping
  // over blockers on slides, no self-capture, and may not leave its royalty attacked.

  const inB = (r,c) => r>=0 && r<8 && c>=0 && c<8;

  // pseudo-legal destinations for the piece at [r,c]. attackOnly=true excludes
  // "teleport anywhere" so an absurd teleporter doesn't count as attacking every square.
  function pieceMoves(bd, r, c, attackOnly=false) {
    const p = bd[r][c]; if (!p) return [];
    const def = defOf(p); if (!def) return [];
    const side = colorOf(p);
    const enemy = side==="w" ? "b" : "w";
    const out = [];
    const seen = new Set();
    const add = (tr,tc) => { const k=tr+","+tc; if(!seen.has(k)){seen.add(k); out.push([tr,tc]);} };
    const leap = (dr,dc) => {
      const tr=r+dr, tc=c+dc;
      if (!inB(tr,tc)) return;
      const d = bd[tr][tc];
      if (!d || colorOf(d)===enemy) add(tr,tc);
    };
    const ray = (dr,dc) => {
      let tr=r+dr, tc=c+dc;
      while (inB(tr,tc)) {
        const d = bd[tr][tc];
        if (!d) { add(tr,tc); }
        else { if (colorOf(d)===enemy) add(tr,tc); break; }
        tr+=dr; tc+=dc;
      }
    };

    if (def.pawn) {
      const dir = side==="w" ? -1 : 1;
      const start = side==="w" ? 6 : 1;
      if (inB(r+dir,c) && !bd[r+dir][c]) {
        add(r+dir,c);
        if (r===start && inB(r+2*dir,c) && !bd[r+2*dir][c]) add(r+2*dir,c);
      }
      for (const dc of [-1,1]) {
        const tr=r+dir, tc=c+dc;
        if (inB(tr,tc) && bd[tr][tc] && colorOf(bd[tr][tc])===enemy) add(tr,tc);
      }
    }
    (def.leaps||[]).forEach(([dr,dc])=>leap(dr,dc));
    (def.slides||[]).forEach(([dr,dc])=>ray(dr,dc));
    if (def.teleport && !attackOnly) {
      for (let tr=0;tr<8;tr++) for (let tc=0;tc<8;tc++){
        if (tr===r && tc===c) continue;
        const d = bd[tr][tc];
        if (!d || colorOf(d)===enemy) add(tr,tc);
      }
    }
    return out;
  }

  // squares of a side's royal pieces
  function royalSquares(bd, side) {
    const out = [];
    for (let r=0;r<8;r++) for (let c=0;c<8;c++){
      const p = bd[r][c];
      if (p && colorOf(p)===side) { const d = defOf(p); if (d && d.royal) out.push([r,c]); }
    }
    return out;
  }
  const hasRoyal = (bd, side) => royalSquares(bd, side).length > 0;

  // is `side`'s royalty attacked on board bd?
  function inCheck(bd, side) {
    const royals = royalSquares(bd, side);
    if (!royals.length) return false;
    const enemy = side==="w" ? "b" : "w";
    for (let r=0;r<8;r++) for (let c=0;c<8;c++){
      if (bd[r][c] && colorOf(bd[r][c])===enemy){
        for (const [tr,tc] of pieceMoves(bd,r,c,true))
          if (royals.some(([kr,kc])=>kr===tr && kc===tc)) return true;
      }
    }
    return false;
  }

  function cloneBoard(bd){ return bd.map(row=>row.slice()); }

  // fully legal moves for a side (filters out moves leaving own royalty attacked)
  function legalMoves(bd, side) {
    const moves = [];
    for (let r=0;r<8;r++) for (let c=0;c<8;c++){
      if (bd[r][c] && colorOf(bd[r][c])===side){
        for (const [tr,tc] of pieceMoves(bd,r,c)){
          const nb = cloneBoard(bd);
          nb[tr][tc] = nb[r][c]; nb[r][c] = null;
          const md = defOf(nb[tr][tc]);
          if (md && md.pawn && (tr===0||tr===7)) nb[tr][tc]=side+"Q";
          if (!inCheck(nb, side)) moves.push([[r,c],[tr,tc]]);
        }
      }
    }
    return moves;
  }

  const sameSq = (a,b) => a[0]===b[0] && a[1]===b[1];

  function applyAiMove(move, say) {
    const legal = legalMoves(state.board, "b");

    // No legal Black move: checkmate or stalemate on Black.
    if (!legal.length) {
      state.speech = say || "…";
      state.busy = false;
      state.turn = "b";
      drawBoard(); drawStatus(); drawSpeech();
      return endByRule();
    }

    let from = move && parseSq(move.from);
    let to   = move && parseSq(move.to);

    // accept the API's move only if it's actually legal for Black
    let chosen = null;
    if (from && to) chosen = legal.find(m => sameSq(m[0],from) && sameSq(m[1],to)) || null;
    // otherwise pick a legal move for it (prefer captures) so it never plays illegally
    if (!chosen) {
      const caps = legal.filter(([f,t]) => state.board[t[0]][t[1]]);
      const pool = caps.length ? caps : legal;
      chosen = pool[(Math.random()*pool.length)|0];
      if (!say) say = "I'll keep my position solid here.";
    }

    const [f, t] = chosen;
    const pc = state.board[f[0]][f[1]];
    const cap = state.board[t[0]][t[1]];
    state.board[t[0]][t[1]] = pc;
    state.board[f[0]][f[1]] = null;
    const pd = defOf(pc);
    if (pd && pd.pawn && t[0]===7) state.board[t[0]][t[1]]="bQ";
    state.last = [f,t];
    const givesCheck = inCheck(state.board, "w");
    const notation = notate(pc, f, t, cap) + (givesCheck ? "+" : "");
    logMove("b", notation);

    state.speech = say || "…";
    state.busy = false;
    state.turn = "w";              // back to you
    drawBoard(); drawStatus(); drawSpeech();

    if (checkEnd()) return;         // a royal piece was actually captured
    endByRule();                    // check White for checkmate/stalemate
  }

  // After a move, detect checkmate/stalemate on Black (you winning). Your unrestricted
  // moves mean you're never truly mated, so we only rule on Black's position.
  function endByRule() {
    const blackMoves = legalMoves(state.board, "b");
    const blackChecked = inCheck(state.board, "b");
    if (blackMoves.length===0) {
      if (blackChecked) {
        state.over = "Checkmate. The black king has no escape — you win.";
        state.speech = "That's mate… give me a moment.";
        reactToAftermath("checkmate", "White (the human) checkmated me. I (Black) lost.");
      } else {
        state.over = "Stalemate. Black has no legal move — the game is drawn.";
        state.speech = "Stalemate… let me look back at that.";
        reactToAftermath("stalemate", "The game ended in stalemate — a draw. I (Black) had no legal move but was not in check.");
      }
      state.turn = null;
      drawStatus(); drawSpeech(); drawBoard();
      return true;
    }
    return false;
  }

  // Live end-of-game reflection from the API on how the whole game played out.
  async function reactToAftermath(kind, outcomeLine) {
    if (!state.apiKey) return;
    const sys = `You just finished a serious game of chess playing as Black against a human (White). The game is now over. Look back over the entire game and give a genuine post-game reflection: how the game went, turning points, moments that surprised or troubled you, and a gracious closing word to your opponent. Two to four sentences, spoken in your own voice as the player. Plain text only — no JSON, no quotes around it.`;
    const user = `Full move history:
${historyText()}

Final position:
${boardText()}

Result: ${outcomeLine}

Reflect on the game now that it's over.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: sys,
          messages: [{ role: "user", content: user }]
        })
      });
      const data = await res.json();
      const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if (text) { state.speech = text.replace(/^["']|["']$/g,""); drawSpeech(); }
    } catch (e) { /* keep the interim line */ }
  }

  function clearBoard() {
    for (let r=0;r<8;r++) for (let c=0;c<8;c++) state.board[r][c]=null;
    state.sel=null; state.last=null; state.over=false; state.turn="w";
    drawBoard(); drawStatus();
  }

  function newGame() {
    Object.assign(state, {
      board: freshBoard(), turn:"w", sel:null, last:null,
      history:[], busy:false, over:false,
      speech:"Waiting for your first move."
    });
    render();
  }

  render();
</script>
